name: Blog API CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r blog_api/requirements.txt

      - name: Run Ruff lint
        run: |
          ruff check blog_api/

      - name: Run Ruff format check
        run: |
          ruff format blog_api/ --check

      - name: Run tests
        run: |
          cd blog_api && pytest -v
